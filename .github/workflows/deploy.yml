name: Deploy Tandem to GCP Compute Engine

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    environment: prod

    permissions:
      contents: 'read'
      id-token: 'write'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Dynamically generate the .env file from GitHub Secrets (Secured)
      - name: Inject Secrets to .env
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_TOKEN_TTL: ${{ secrets.JWT_TOKEN_TTL }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          echo "Writing secrets to .env file..."
          cat <<EOF > .env
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_KEY=$SUPABASE_KEY
          JWT_SECRET=$JWT_SECRET
          JWT_TOKEN_TTL=$JWT_TOKEN_TTL
          DOMAIN_NAME=$DOMAIN_NAME
          GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID
          EOF
          
      - name: Clean up for transfer
        run: rm -rf .git

      # 2. Keyless Authentication via Workload Identity Federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      # 3. Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. Transfer the codebase to the GCE VM (Fixed hidden files issue)
      - name: Copy files to VM via gcloud scp
        run: |
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --command="sudo mkdir -p /opt/tandem && sudo chown -R \$(whoami) /opt/tandem"

          # Use dotglob so that '*' captures hidden files like .dockerignore
          shopt -s dotglob 
          gcloud compute scp --recurse * ${{ secrets.GCP_VM_NAME }}:/opt/tandem/ \
            --zone=${{ secrets.GCP_ZONE }} \
            --project=${{ secrets.GCP_PROJECT }}

      # 5. Execute the Docker Compose commands on the VM (Zero-downtime fix)
      - name: Execute deployment via gcloud ssh
        run: |
          gcloud compute ssh ${{ secrets.GCP_VM_NAME }} \
            --zone=${{ secrets.GCP_ZONE }} \
            --project=${{ secrets.GCP_PROJECT }} \
            --command="
              # Fail the deploy if any step fails — without this the SSH exit
              # code comes from the final command (prune, always 0), masking a
              # failed build/up and reporting a green deploy that did nothing.
              set -eo pipefail
              cd /opt/tandem

              # Reclaim disk BEFORE building. Old deploys leave build cache
              # (Go module downloads, node_modules layers) and orphaned images
              # that 'docker image prune' alone never touches — over time this
              # fills the VM disk and the build dies with 'no space left on
              # device'. Running it up front (not just after) also breaks the
              # death spiral where a build fails on a full disk and the trailing
              # cleanup never runs, so the next deploy starts already-full.
              #
              # Currently-running containers protect their own images/volumes,
              # so this only removes genuinely unused data. We deliberately do
              # NOT pass --volumes: the named volumes hold real state
              # (canvas-images uploads, caddy_data TLS certs) that must survive.
              echo '→ Disk usage before cleanup:'
              df -h / | tail -1
              echo '→ Reclaiming Docker disk (stopped containers, unused images, build cache)...'
              sudo docker container prune -f
              sudo docker image prune -af
              sudo docker builder prune -af
              echo '→ Disk usage after cleanup:'
              df -h / | tail -1

              # --ignore-buildable: tandem/mcp images are built locally and are
              # NOT in any registry, so a plain 'pull' errors on them. This pulls
              # only the third-party images (caddy).
              echo '→ Pulling latest base images...'
              sudo docker compose pull --ignore-buildable

              echo '→ Deploying Tandem containers...'
              sudo docker compose up -d --build

              # Caddyfile is bind-mounted, so a file change alone never restarts
              # Caddy and 'compose up' won't recreate it unless its service hash
              # changed. Reload explicitly so routing changes always take effect.
              echo '→ Reloading Caddy config...'
              sudo docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile

              # Drop the image the previous 'tandem:latest' tag just orphaned.
              echo '→ Pruning images orphaned by this build...'
              sudo docker image prune -f
            "