<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tandem — animated logo</title>
<style>
  @keyframes tdmDraw  {0%{stroke-dashoffset:100}22%{stroke-dashoffset:0}92%{stroke-dashoffset:0}100%{stroke-dashoffset:100}}
  @keyframes tdmDraw2 {0%,8%{stroke-dashoffset:100}30%{stroke-dashoffset:0}92%{stroke-dashoffset:0}100%{stroke-dashoffset:100}}
  @keyframes tdmBar   {0%,18%{stroke-dashoffset:100}34%{stroke-dashoffset:0}92%{stroke-dashoffset:0}100%{stroke-dashoffset:100}}
  @keyframes tdmPop   {0%,30%{transform:scale(0)}44%{transform:scale(1.15)}50%{transform:scale(1)}92%{transform:scale(1)}100%{transform:scale(0)}}
  @keyframes tdmPopA  {0%,37%{transform:scale(0)}50%{transform:scale(1.15)}56%{transform:scale(1)}92%{transform:scale(1)}100%{transform:scale(0)}}
  html,body{margin:0;height:100%;display:grid;place-items:center;background:#FBFAF8;}
  .tile{width:min(46vmin,320px);aspect-ratio:1;}
  .arc,.bar{stroke-dasharray:100;stroke-dashoffset:100;}
  .bead{transform-box:fill-box;transform-origin:center;}
  .a1{animation:tdmDraw 3.6s ease infinite}
  .a2{animation:tdmDraw2 3.6s ease infinite}
  .ab{animation:tdmBar 3.6s ease infinite}
  .bh{animation:tdmPop 3.6s ease infinite}
  .ba{animation:tdmPopA 3.6s ease infinite}
</style>
</head>
<body>
  <svg class="tile" viewBox="0 0 120 120" fill="none" role="img" aria-label="Tandem logo">
    <rect width="120" height="120" rx="27" fill="#0D6E66"/>
    <g transform="translate(60,60) scale(0.84) translate(-60,-60)">
      <path class="arc a1" pathLength="100" d="M85.3 37.3 A34 34 0 0 1 52.9 93.3" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
      <path class="arc a2" pathLength="100" d="M34.7 82.7 A34 34 0 0 1 67.1 26.7" stroke="#fff" stroke-width="9" stroke-linecap="round"/>
      <line class="bar ab" pathLength="100" x1="43" y1="89" x2="77" y2="31" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <circle class="bead bh" cx="43" cy="89" r="11" fill="#0D6E66" stroke="#fff" stroke-width="6"/>
      <circle class="bead ba" cx="77" cy="31" r="11" fill="#fff"/>
    </g>
  </svg>
</body>
</html>
