services:
  tandem:
    build:
      context: .
      dockerfile: Dockerfile
    image: tandem:latest
    container_name: tandem
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL:?set SUPABASE_URL in .env}
      SUPABASE_KEY: ${SUPABASE_KEY:?set SUPABASE_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      PORT: "7891" 
      WEB_DIST_PATH: ${WEB_DIST_PATH:-/app/web/dist}
      # You can still pass this to the app internally if your code needs it
      IMAGE_DIR: "/app/canvas-images" 
      JWT_TOKEN_TTL: ${JWT_TOKEN_TTL:-24h}
    volumes:
      # FIX: Hardcoded the absolute path on the container side (/app/canvas-images)
      - canvas-images:/app/canvas-images
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7891/api/maps"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"     
      - "443:443"   
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:?set DOMAIN_NAME in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data    
      - caddy_config:/config
    depends_on:
      - tandem

volumes:
  canvas-images:
  caddy_data:
  caddy_config: