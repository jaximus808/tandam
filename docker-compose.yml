services:
  tandem:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time only: baked into the static web bundle by Vite. Maps the
        # .env's GOOGLE_CLIENT_ID onto the VITE_-prefixed name Vite requires.
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
    image: tandem:latest
    container_name: tandem
    restart: unless-stopped
    environment:
      SUPABASE_URL: ${SUPABASE_URL:?set SUPABASE_URL in .env}
      SUPABASE_KEY: ${SUPABASE_KEY:?set SUPABASE_KEY in .env}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      PORT: "7891"
      WEB_DIST_PATH: ${WEB_DIST_PATH:-/app/web/dist}
      # You can still pass this to the app internally if your code needs it
      IMAGE_DIR: "/app/canvas-images"
      JWT_TOKEN_TTL: ${JWT_TOKEN_TTL:-24h}
      # Runtime: the Go server verifies Google ID tokens against this audience.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
    volumes:
      # FIX: Hardcoded the absolute path on the container side (/app/canvas-images)
      - canvas-images:/app/canvas-images
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7891/api/maps"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Hosted MCP endpoint (Streamable HTTP). Exposes the same tool surface as the
  # published @jaximus/tandem-mcp stdio CLI so zero-install clients can connect
  # to https://tandemcanvas.com/api/mcp by URL. Talks to the Go API over the
  # internal compose network — never back out through the public domain.
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: tandem-mcp:latest
    container_name: tandem-mcp
    restart: unless-stopped
    environment:
      # Internal docker DNS: the Go API service is `tandem` on port 7891.
      API_URL: "http://tandem:7891"
      PORT: "8970"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8970/healthz"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      - tandem

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:?set DOMAIN_NAME in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - tandem
      - mcp

volumes:
  canvas-images:
  caddy_data:
  caddy_config: